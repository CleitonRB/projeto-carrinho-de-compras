<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lojinha</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/funcoes.js"></script>
</head>
<body>

    <div class="container">

        <h1> <i class="bi bi-cart-check" id="cifrao"></i> Lojinha da Unidade</h1>

        <table class="table table-hover table-bordered">
            <thead>
                <tr>
                    <th>Imagem</th>
                    <th>Produto</th>
                    <th>Preço unitario</th>
                    <th>Qtd</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        <img src="img/produto_1.avif" alt="celular" width="200">
                    </td>
                    <td>
                        <div>Celular top</div>
                        <div><span id="prod_destaque">Código: </span>123456</div>
                        <div><span id="prod_destaque">Cor: </span>White</div>
                    </td>
                    <td id="valor_1">1000</td>
                    <td>
                        <span class="badge text-bg-danger" onclick="alterarQtd(1, '-')"> <i class="bi bi-dash"></i> </span>
                        <span id="qtd_1">0</span>
                        <span class="badge text-bg-success" onclick="alterarQtd(1, '+')"> <i class="bi bi-plus"></i> </span>
                    </td>
                    <td id="total_1">0</td>
                </tr>
                <tr>
                    <td>
                        <img src="img/produto_2.webp" alt="notebook" width="200">
                    </td>
                    <td>
                        <div>Notebook Roda tudo</div>
                        <div><span id="prod_destaque">Código: </span>654321</div>
                        <div><span id="prod_destaque">Cor: </span>Gray</div>
                    </td>
                    <td id="valor_2">1000</td>
                    <td>
                        <span class="badge text-bg-danger" onclick="alterarQtd(2, '-')"> <i class="bi bi-dash"></i> </span>
                        <span id="qtd_2">0</span>
                        <span class="badge text-bg-success" onclick="alterarQtd(2, '+')"> <i class="bi bi-plus"></i> </span>
                    </td>
                    <td id="total_2">0</td>
                </tr>
                <tr>
                    <td>
                        <img src="img/produto_3.webp" alt="televisão" width="200">
                    </td>
                    <td>
                        <div>TV cinema em casa</div>
                        <div><span id="prod_destaque">Código: </span>153426</div>
                        <div><span id="prod_destaque">Cor: </span>black</div>
                    </td>
                    <td id="valor_3">1000</td>
                    <td>
                        <span class="badge text-bg-danger" onclick="alterarQtd(3, '-')"> <i class="bi bi-dash"></i> </span>
                        <span id="qtd_3">0</span>
                        <span class="badge text-bg-success" onclick="alterarQtd(3, '+')"> <i class="bi bi-plus"></i> </span>
                    </td>
                    <td id="total_3">0</td>
                </tr>
            </tbody>
        </table>

        <footer class="text-center">
            <span> <i class="bi bi-cart"></i> SubTotal: <span id="subTotal">0</span></span>
        </footer>

    </div>
</body>
</html>
